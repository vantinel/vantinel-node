name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and publish packages
        run: |
          for pkg in packages/node-sdk packages/js-sdk packages/nextjs packages/mcp packages/openclaw packages/openclaw-plugin; do
            [ -d "$pkg" ] || continue
            echo "--- Building $pkg ---"
            npm run build --workspace $pkg || { echo "Build failed for $pkg, skipping"; continue; }
            echo "--- Publishing $pkg ---"
            npm publish --workspace $pkg --access public || echo "Skipping $pkg (already published at this version)"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
